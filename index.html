<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Inventory Realtime</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #2563eb;
            --primary-hover: #1d4ed8;
            --bg-dark: #0f172a;
            --card-bg: #1e293b;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --border: #334155;
            --success: #10b981;
            --danger: #ef4444;
            --warning: #f59e0b;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', sans-serif;
        }

        body {
            background-color: var(--bg-dark);
            color: var(--text-main);
            line-height: 1.6;
            padding: 20px;
            min-height: 100vh;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        header {
            margin-bottom: 30px;
            text-align: center;
        }

        header h1 {
            font-size: 2.5rem;
            font-weight: 800;
            letter-spacing: -0.05em;
            color: var(--text-main);
            margin-bottom: 5px;
        }

        header p {
            color: var(--text-muted);
            font-size: 1.1rem;
        }

        .dashboard-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .stat-card {
            background: var(--card-bg);
            border: 1px solid var(--border);
            padding: 20px;
            border-radius: 16px;
            display: flex;
            flex-direction: column;
            gap: 8px;
            transition: transform 0.3s ease;
        }

        .stat-label {
            font-size: 0.85rem;
            color: var(--text-muted);
            font-weight: 500;
            text-transform: uppercase;
        }

        .stat-value {
            font-size: 1.8rem;
            font-weight: 700;
            color: var(--text-main);
        }

        .main-layout {
            display: grid;
            grid-template-columns: 380px 1fr;
            gap: 24px;
        }

        @media (max-width: 1024px) {
            .main-layout { grid-template-columns: 1fr; }
        }

        .card {
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 24px;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
        }

        .card-title {
            font-size: 1.25rem;
            font-weight: 600;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 10px;
            border-bottom: 1px solid var(--border);
            padding-bottom: 12px;
        }

        .form-group { margin-bottom: 16px; }

        label {
            display: block;
            font-size: 0.875rem;
            font-weight: 500;
            margin-bottom: 6px;
            color: var(--text-muted);
        }

        input, select, textarea {
            width: 100%;
            padding: 10px 14px;
            background: var(--bg-dark);
            border: 1px solid var(--border);
            border-radius: 8px;
            color: var(--text-main);
            outline: none;
        }

        input:focus { border-color: var(--primary); }

        .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }

        #imagePreview {
            width: 100%;
            max-height: 200px;
            border-radius: 8px;
            object-fit: cover;
            display: none;
            margin-top: 10px;
            border: 1px solid var(--border);
        }

        .btn {
            cursor: pointer;
            padding: 12px 20px;
            border-radius: 8px;
            font-weight: 600;
            border: none;
            width: 100%;
            transition: 0.2s;
        }

        .btn-primary { background: var(--primary); color: white; }
        .btn-primary:disabled { opacity: 0.5; cursor: not-allowed; }
        .btn-outline { background: transparent; border: 1px solid var(--border); color: var(--text-main); margin-top: 10px; }

        .table-container { overflow-x: auto; }
        table { width: 100%; border-collapse: collapse; }
        th { padding: 12px; color: var(--text-muted); font-size: 0.75rem; text-transform: uppercase; text-align: left; border-bottom: 2px solid var(--border); }
        td { padding: 16px; border-bottom: 1px solid var(--border); vertical-align: middle; }

        .badge { padding: 4px 10px; border-radius: 999px; font-size: 0.7rem; font-weight: 700; }
        .badge-success { background: rgba(16, 185, 129, 0.15); color: #10b981; }
        .badge-warning { background: rgba(245, 158, 11, 0.15); color: #f59e0b; }
        .badge-danger { background: rgba(239, 68, 68, 0.15); color: #ef4444; }

        .btn-icon { padding: 8px; border-radius: 8px; background: var(--bg-dark); border: 1px solid var(--border); color: white; cursor: pointer; }
        .btn-icon:hover { background: var(--primary); }

        #toast {
            position: fixed; bottom: 30px; right: 30px; background: var(--primary); color: white;
            padding: 14px 28px; border-radius: 12px; display: none; z-index: 1000;
        }

        .loading-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(15, 23, 42, 0.8); display: flex; align-items: center;
            justify-content: center; z-index: 9999;
        }
    </style>
</head>
<body>

    <div id="loader" class="loading-overlay">
        <div style="text-align: center;">
            <div style="font-size: 2rem;">⏳</div>
            <p>Menghubungkan ke Cloud...</p>
        </div>
    </div>

    <div id="loginModal" class="loading-overlay" style="display: none;">
        <div class="card" style="width: 320px;">
            <div class="card-title">🔐 Admin Login</div>
            <div class="form-group">
                <label>Email</label>
                <input type="email" id="loginEmail" placeholder="admin@resort.com">
            </div>
            <div class="form-group">
                <label>Password</label>
                <input type="password" id="loginPassword">
            </div>
            <button id="doLogin" class="btn btn-primary">Masuk</button>
            <button id="closeLogin" class="btn btn-outline">Batal</button>
        </div>
    </div>

    <div class="container">
        <header>
            <h1>📦 Smart Inventory Cloud</h1>
            <p id="userStatus">Sinkronisasi Realtime Aktif</p>
        </header>

        <section class="dashboard-grid">
            <div class="stat-card">
                <div class="stat-label">Total Item</div>
                <div class="stat-value" id="stat-total">0</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">Kategori Hewan</div>
                <div class="stat-value" id="stat-hewan">0</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">Kategori Benda</div>
                <div class="stat-value" id="stat-benda">0</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">Peringatan Kondisi</div>
                <div class="stat-value" id="stat-alert">0</div>
            </div>
        </section>

        <main class="main-layout">
            <section>
                <div class="card">
                    <div class="card-title">📝 <span id="formTitle">Tambah Inventori</span></div>
                    <form id="inventoryForm">
                        <input type="hidden" id="editId">
                        
                        <div class="form-group">
                            <label>Kode Inventori</label>
                            <input type="text" id="itemCode" readonly>
                        </div>

                        <div class="form-group">
                            <label>Nama Barang / Hewan *</label>
                            <input type="text" id="itemName" required>
                        </div>

                        <div class="grid-2">
                            <div class="form-group">
                                <label>Kategori</label>
                                <select id="category">
                                    <option value="Benda">Benda</option>
                                    <option value="Hewan">Hewan</option>
                                </select>
                            </div>
                            <div class="form-group">
                                <label>Kondisi</label>
                                <select id="condition">
                                    <option value="Baik">Baik</option>
                                    <option value="Rusak">Rusak</option>
                                    <option value="Mati">Mati</option>
                                </select>
                            </div>
                        </div>

                        <div class="grid-2">
                            <div class="form-group">
                                <label>Jumlah</label>
                                <input type="number" id="qty" value="0" min="0">
                            </div>
                            <div class="form-group">
                                <label>Satuan</label>
                                <select id="unit">
                                    <option value="Ekor">Ekor</option>
                                    <option value="Unit">Unit</option>
                                    <option value="Pcs">Pcs</option>
                                    <option value="Box">Box</option>
                                    <option value="Kg">Kg</option>
                                </select>
                            </div>
                        </div>

                        <div class="form-group">
                            <label>Lokasi Penyimpanan *</label>
                            <input type="text" id="location" required placeholder="Gudang, Rak 1, dll">
                        </div>

                        <div class="form-group">
                            <label>Catatan</label>
                            <textarea id="description" rows="2"></textarea>
                        </div>

                        <div class="form-group">
                            <label>Foto Item</label>
                            <input type="file" id="imageInput" accept="image/*">
                            <img id="imagePreview" alt="Preview">
                        </div>

                        <button type="submit" class="btn btn-primary" id="submitBtn">💾 Simpan ke Cloud</button>
                        <button type="button" class="btn btn-outline" id="cancelBtn" style="display:none;">❌ Batalkan</button>
                    </form>
                </div>
            </section>

            <section>
                <div class="card">
                    <div class="card-title">📊 Daftar Seluruh Barang</div>
                    <div class="table-container">
                        <table>
                            <thead>
                                <tr>
                                    <th>Item</th>
                                    <th>Stok</th>
                                    <th>Lokasi</th>
                                    <th>Kondisi</th>
                                    <th>Aksi</th>
                                </tr>
                            </thead>
                            <tbody id="inventoryBody"></tbody>
                        </table>
                    </div>
                </div>
            </section>
            
            <div style="position: fixed; top: 20px; right: 20px; z-index: 100;">
    <button id="authBtn" class="btn" style="width: auto; background: var(--card-bg); border: 1px solid var(--border);">🔐 Login Admin</button>
</div>

<div id="loginModal" class="loading-overlay" style="display: none; border-radius: 0;">
    <div class="card" style="width: 320px;">
        <div class="card-title">Admin Login</div>
        <div class="form-group">
            <label>Email</label>
            <input type="email" id="loginEmail" placeholder="admin@resort.com">
        </div>
        <div class="form-group">
            <label>Password</label>
            <input type="password" id="loginPassword">
        </div>
        <button id="doLogin" class="btn btn-primary">Masuk</button>
        <button id="closeLogin" class="btn btn-outline">Batal</button>
    </div>
</div>
            
        </main>
    </div>

    <div id="toast"></div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";
        import { getDatabase, ref, set, onValue, push, remove, update } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-database.js";
        import { getAuth, signInAnonymously, signInWithEmailAndPassword, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBU_8nsWAQxTU9XDrl0rrlvJcA8x7068Cs",
            authDomain: "inventori-outbound.firebaseapp.com",
            databaseURL: "https://inventori-outbound-default-rtdb.firebaseio.com",
            projectId: "inventori-outbound"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        const auth = getAuth(app);

        let inventoryData = [];
        let isEditing = false;
        let currentImageBase64 = "";

        const elements = {
            form: document.getElementById('inventoryForm'),
            body: document.getElementById('inventoryBody'),
            imgInput: document.getElementById('imageInput'),
            imgPrev: document.getElementById('imagePreview'),
            itemCode: document.getElementById('itemCode'),
            loader: document.getElementById('loader'),
            toast: document.getElementById('toast'),
            formTitle: document.getElementById('formTitle'),
            cancelBtn: document.getElementById('cancelBtn'),
            submitBtn: document.getElementById('submitBtn'),
            adminSection: document.getElementById('adminFormSection'),
            authBtn: document.getElementById('authBtn'),
            loginModal: document.getElementById('loginModal')
        };

        // --- AUTH LOGIC ---
        onAuthStateChanged(auth, (user) => {
            if (user) {
                const isAdmin = !user.isAnonymous;
                document.getElementById('userStatus').textContent = isAdmin ? "Mode: Admin (Full Access)" : "Mode: Pantau (Read-Only)";
                elements.adminSection.style.display = isAdmin ? "block" : "none";
                elements.authBtn.textContent = isAdmin ? "🚀 Logout Admin" : "🔐 Login Admin";
                
                // Ubah layout grid jika bukan admin agar tabel melebar
                document.querySelector('.main-layout').style.gridTemplateColumns = isAdmin ? "380px 1fr" : "1fr";
                
                setupRealtimeListener();
                elements.loader.style.display = 'none';
            } else {
                signInAnonymously(auth);
            }
        });

        elements.authBtn.onclick = () => {
            if (auth.currentUser && !auth.currentUser.isAnonymous) {
                signOut(auth).then(() => location.reload());
            } else {
                elements.loginModal.style.display = "flex";
            }
        };

        document.getElementById('doLogin').onclick = async () => {
            const email = document.getElementById('loginEmail').value;
            const pass = document.getElementById('loginPassword').value;
            try {
                await signInWithEmailAndPassword(auth, email, pass);
                elements.loginModal.style.display = "none";
                showToast("Login Berhasil!");
            } catch (err) { alert("Login Gagal: " + err.message); }
        };

        document.getElementById('closeLogin').onclick = () => elements.loginModal.style.display = "none";

        // --- DATABASE LOGIC ---
        function setupRealtimeListener() {
            onValue(ref(db, 'inventory'), (snapshot) => {
                const data = snapshot.val();
                inventoryData = data ? Object.keys(data).map(key => ({ id: key, ...data[key] })) : [];
                inventoryData.sort((a, b) => b.timestamp - a.timestamp);
                renderTable();
                updateDashboard();
            });
        }

        function renderTable() {
            elements.body.innerHTML = "";
            const isAdmin = auth.currentUser && !auth.currentUser.isAnonymous;
            
            inventoryData.forEach(item => {
                const condClass = item.condition === 'Baik' ? 'badge-success' : (item.condition === 'Rusak' ? 'badge-warning' : 'badge-danger');
                const tr = document.createElement('tr');
                tr.innerHTML = `
                    <td>
                        <div style="display:flex; align-items:center; gap:10px;">
                            ${item.image ? `<img src="${item.image}" style="width:40px; height:40px; border-radius:8px; object-fit:cover;">` : '📦'}
                            <div><div style="font-weight:600;">${item.name}</div><div style="font-size:0.7rem; color:var(--text-muted);">${item.code}</div></div>
                        </div>
                    </td>
                    <td><b>${item.qty}</b> <span style="font-size:0.8rem; opacity:0.7;">${item.unit}</span></td>
                    <td>📍 ${item.location}</td>
                    <td><span class="badge ${condClass}">${item.condition}</span></td>
                    <td>
                        ${isAdmin ? `
                            <button class="btn-icon" onclick="editItem('${item.id}')">✏️</button>
                            <button class="btn-icon" onclick="deleteItem('${item.id}')">🗑️</button>
                        ` : '🔒'}
                    </td>
                `;
                elements.body.appendChild(tr);
            });
        }

        // Action Handlers
        elements.form.onsubmit = async (e) => {
            e.preventDefault();
            const data = {
                code: elements.itemCode.value,
                name: document.getElementById('itemName').value,
                category: document.getElementById('category').value,
                condition: document.getElementById('condition').value,
                qty: parseInt(document.getElementById('qty').value),
                unit: document.getElementById('unit').value,
                location: document.getElementById('location').value,
                image: currentImageBase64,
                timestamp: Date.now()
            };

            if (isEditing) {
                await update(ref(db, `inventory/${document.getElementById('editId').value}`), data);
            } else {
                await set(push(ref(db, 'inventory')), data);
            }
            resetForm();
            showToast("Data Berhasil Disimpan!");
        };

        window.editItem = (id) => {
            const item = inventoryData.find(i => i.id === id);
            isEditing = true;
            elements.formTitle.textContent = "Ubah Data";
            elements.submitBtn.textContent = "🔄 Update Data";
            elements.cancelBtn.style.display = "block";
            document.getElementById('editId').value = id;
            document.getElementById('itemName').value = item.name;
            elements.itemCode.value = item.code;
            if (item.image) { currentImageBase64 = item.image; elements.imgPrev.src = item.image; elements.imgPrev.style.display = 'block'; }
            window.scrollTo({ top: 0, behavior: 'smooth' });
        };

        window.deleteItem = (id) => { if(confirm("Hapus?")) remove(ref(db, `inventory/${id}`)); };

        function updateDashboard() {
            document.getElementById('stat-total').textContent = inventoryData.length;
            document.getElementById('stat-hewan').textContent = inventoryData.filter(i => i.category === 'Hewan').length;
            document.getElementById('stat-benda').textContent = inventoryData.filter(i => i.category === 'Benda').length;
            document.getElementById('stat-alert').textContent = inventoryData.filter(i => i.condition !== 'Baik').length;
        }

        function resetForm() {
            isEditing = false;
            elements.form.reset();
            elements.imgPrev.style.display = 'none';
            currentImageBase64 = "";
            generateCode();
        }

        function generateCode() { elements.itemCode.value = "INV-" + Math.random().toString(36).substr(2, 6).toUpperCase(); }
        function showToast(msg) { elements.toast.textContent = msg; elements.toast.style.display = 'block'; setTimeout(() => elements.toast.style.display = 'none', 3000); }
        
        elements.imgInput.onchange = (e) => {
            const reader = new FileReader();
            reader.onload = (ev) => { currentImageBase64 = ev.target.result; elements.imgPrev.src = ev.target.result; elements.imgPrev.style.display = 'block'; };
            reader.readAsDataURL(e.target.files[0]);
        };

        generateCode();
    </script>
</body>
</html>
