<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Inventory Realtime</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #2563eb;
            --primary-hover: #1d4ed8;
            --bg-dark: #0f172a;
            --card-bg: #1e293b;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --border: #334155;
            --success: #10b981;
            --danger: #ef4444;
            --warning: #f59e0b;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', sans-serif;
        }

        body {
            background-color: var(--bg-dark);
            color: var(--text-main);
            line-height: 1.6;
            padding: 20px;
            min-height: 100vh;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        header {
            margin-bottom: 30px;
            text-align: center;
        }

        header h1 {
            font-size: 2.5rem;
            font-weight: 800;
            letter-spacing: -0.05em;
            color: var(--text-main);
            margin-bottom: 5px;
        }

        header p {
            color: var(--text-muted);
            font-size: 1.1rem;
        }

        .dashboard-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .stat-card {
            background: var(--card-bg);
            border: 1px solid var(--border);
            padding: 20px;
            border-radius: 16px;
            display: flex;
            flex-direction: column;
            gap: 8px;
            transition: transform 0.3s ease;
        }

        .stat-label {
            font-size: 0.85rem;
            color: var(--text-muted);
            font-weight: 500;
            text-transform: uppercase;
        }

        .stat-value {
            font-size: 1.8rem;
            font-weight: 700;
            color: var(--text-main);
        }

        .main-layout {
            display: grid;
            grid-template-columns: 380px 1fr;
            gap: 24px;
        }

        @media (max-width: 1024px) {
            .main-layout { grid-template-columns: 1fr; }
        }

        .card {
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 24px;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
        }

        .card-title {
            font-size: 1.25rem;
            font-weight: 600;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 10px;
            border-bottom: 1px solid var(--border);
            padding-bottom: 12px;
        }

        .form-group { margin-bottom: 16px; }

        label {
            display: block;
            font-size: 0.875rem;
            font-weight: 500;
            margin-bottom: 6px;
            color: var(--text-muted);
        }

        input, select, textarea {
            width: 100%;
            padding: 10px 14px;
            background: var(--bg-dark);
            border: 1px solid var(--border);
            border-radius: 8px;
            color: var(--text-main);
            outline: none;
        }

        input:focus { border-color: var(--primary); }

        .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }

        #imagePreview {
            width: 100%;
            max-height: 200px;
            border-radius: 8px;
            object-fit: cover;
            display: none;
            margin-top: 10px;
            border: 1px solid var(--border);
        }

        .btn {
            cursor: pointer;
            padding: 12px 20px;
            border-radius: 8px;
            font-weight: 600;
            border: none;
            width: 100%;
            transition: 0.2s;
        }

        .btn-primary { background: var(--primary); color: white; }
        .btn-primary:disabled { opacity: 0.5; cursor: not-allowed; }
        .btn-outline { background: transparent; border: 1px solid var(--border); color: var(--text-main); margin-top: 10px; }

        .table-container { overflow-x: auto; }
        table { width: 100%; border-collapse: collapse; }
        th { padding: 12px; color: var(--text-muted); font-size: 0.75rem; text-transform: uppercase; text-align: left; border-bottom: 2px solid var(--border); }
        td { padding: 16px; border-bottom: 1px solid var(--border); vertical-align: middle; }

        .badge { padding: 4px 10px; border-radius: 999px; font-size: 0.7rem; font-weight: 700; }
        .badge-success { background: rgba(16, 185, 129, 0.15); color: #10b981; }
        .badge-warning { background: rgba(245, 158, 11, 0.15); color: #f59e0b; }
        .badge-danger { background: rgba(239, 68, 68, 0.15); color: #ef4444; }

        .btn-icon { padding: 8px; border-radius: 8px; background: var(--bg-dark); border: 1px solid var(--border); color: white; cursor: pointer; }
        .btn-icon:hover { background: var(--primary); }

        #toast {
            position: fixed; bottom: 30px; right: 30px; background: var(--primary); color: white;
            padding: 14px 28px; border-radius: 12px; display: none; z-index: 1000;
        }

        .loading-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(15, 23, 42, 0.8); display: flex; align-items: center;
            justify-content: center; z-index: 9999;
        }
    </style>
</head>
<body>

    <div id="loader" class="loading-overlay">
        <div style="text-align: center;">
            <div style="font-size: 2rem;">⏳</div>
            <p>Menghubungkan ke Cloud...</p>
        </div>
    </div>

    <div class="container">
        <header>
            <h1>📦 Smart Inventory Cloud</h1>
            <p id="userStatus">Sinkronisasi Realtime Aktif</p>
        </header>

        <section class="dashboard-grid">
            <div class="stat-card">
                <div class="stat-label">Total Item</div>
                <div class="stat-value" id="stat-total">0</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">Kategori Hewan</div>
                <div class="stat-value" id="stat-hewan">0</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">Kategori Benda</div>
                <div class="stat-value" id="stat-benda">0</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">Peringatan Kondisi</div>
                <div class="stat-value" id="stat-alert">0</div>
            </div>
        </section>

        <main class="main-layout">
            <section>
                <div class="card">
                    <div class="card-title">📝 <span id="formTitle">Tambah Inventori</span></div>
                    <form id="inventoryForm">
                        <input type="hidden" id="editId">
                        
                        <div class="form-group">
                            <label>Kode Inventori</label>
                            <input type="text" id="itemCode" readonly>
                        </div>

                        <div class="form-group">
                            <label>Nama Barang / Hewan *</label>
                            <input type="text" id="itemName" required>
                        </div>

                        <div class="grid-2">
                            <div class="form-group">
                                <label>Kategori</label>
                                <select id="category">
                                    <option value="Benda">Benda</option>
                                    <option value="Hewan">Hewan</option>
                                </select>
                            </div>
                            <div class="form-group">
                                <label>Kondisi</label>
                                <select id="condition">
                                    <option value="Baik">Baik</option>
                                    <option value="Rusak">Rusak</option>
                                    <option value="Mati">Mati</option>
                                </select>
                            </div>
                        </div>

                        <div class="grid-2">
                            <div class="form-group">
                                <label>Jumlah</label>
                                <input type="number" id="qty" value="0" min="0">
                            </div>
                            <div class="form-group">
                                <label>Satuan</label>
                                <select id="unit">
                                    <option value="Ekor">Ekor</option>
                                    <option value="Unit">Unit</option>
                                    <option value="Pcs">Pcs</option>
                                    <option value="Box">Box</option>
                                    <option value="Kg">Kg</option>
                                </select>
                            </div>
                        </div>

                        <div class="form-group">
                            <label>Lokasi Penyimpanan *</label>
                            <input type="text" id="location" required placeholder="Gudang, Rak 1, dll">
                        </div>

                        <div class="form-group">
                            <label>Catatan</label>
                            <textarea id="description" rows="2"></textarea>
                        </div>

                        <div class="form-group">
                            <label>Foto Item</label>
                            <input type="file" id="imageInput" accept="image/*">
                            <img id="imagePreview" alt="Preview">
                        </div>

                        <button type="submit" class="btn btn-primary" id="submitBtn">💾 Simpan ke Cloud</button>
                        <button type="button" class="btn btn-outline" id="cancelBtn" style="display:none;">❌ Batalkan</button>
                    </form>
                </div>
            </section>

            <section>
                <div class="card">
                    <div class="card-title">📊 Daftar Seluruh Barang</div>
                    <div class="table-container">
                        <table>
                            <thead>
                                <tr>
                                    <th>Item</th>
                                    <th>Stok</th>
                                    <th>Lokasi</th>
                                    <th>Kondisi</th>
                                    <th>Aksi</th>
                                </tr>
                            </thead>
                            <tbody id="inventoryBody"></tbody>
                        </table>
                    </div>
                </div>
            </section>
        </main>
    </div>

    <div id="toast"></div>

    <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";
    import { 
        getFirestore, collection, doc, setDoc, deleteDoc, 
        onSnapshot, serverTimestamp, query, orderBy 
    } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-firestore.js";
    import { 
        getAuth, signInAnonymously, onAuthStateChanged 
    } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-auth.js";

    // Konfigurasi Firebase Anda
    const firebaseConfig = {
        apiKey: "AIzaSyBU_8nsWAQxTU9XDrl0rrlvJcA8x7068Cs",
        authDomain: "inventori-outbound.firebaseapp.com",
        projectId: "inventori-outbound",
        storageBucket: "inventori-outbound.firebasestorage.app",
        messagingSenderId: "603191770704",
        appId: "1:603191770704:web:302df531503126e2215b55"
    };

    // Initialize Firebase
    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const auth = getAuth(app);

    let inventoryData = [];
    let isEditing = false;
    let currentImageBase64 = "";
    let currentUser = null;

    // Mapping DOM Elements
    const elements = {
        form: document.getElementById('inventoryForm'),
        body: document.getElementById('inventoryBody'),
        imgInput: document.getElementById('imageInput'),
        imgPrev: document.getElementById('imagePreview'),
        itemCode: document.getElementById('itemCode'),
        loader: document.getElementById('loader'),
        toast: document.getElementById('toast'),
        formTitle: document.getElementById('formTitle'),
        cancelBtn: document.getElementById('cancelBtn'),
        submitBtn: document.getElementById('submitBtn'),
        statTotal: document.getElementById('stat-total'),
        statHewan: document.getElementById('stat-hewan'),
        statBenda: document.getElementById('stat-benda'),
        statAlert: document.getElementById('stat-alert')
    };

    // --- AUTHENTICATION ---
    onAuthStateChanged(auth, (user) => {
        currentUser = user;
        if (user) {
            document.getElementById('userStatus').textContent = `Sinkronisasi Aktif: ${user.uid.substring(0,8)}...`;
            setupRealtimeListener();
            elements.loader.style.display = 'none';
        } else {
            signInAnonymously(auth);
        }
    });

    // --- FIRESTORE REALTIME LISTENER ---
    function setupRealtimeListener() {
        // Mengambil referensi koleksi 'items'
        const colRef = collection(db, 'items');
        // Query untuk mengurutkan berdasarkan waktu update terbaru
        const q = query(colRef, orderBy("updatedAt", "desc"));
        
        // Fungsi onSnapshot inilah yang membuat "Realtime"
        onSnapshot(q, (snapshot) => {
            inventoryData = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
            renderTable();
            updateDashboard();
        }, (error) => {
            console.error("Snapshot error:", error);
            showToast("Gagal memuat data realtime.");
        });
    }

    // --- UI RENDERING ---
    function renderTable() {
        elements.body.innerHTML = "";
        inventoryData.forEach(item => {
            const conditionClass = item.condition === 'Baik' ? 'badge-success' : 
                                  (item.condition === 'Rusak' ? 'badge-warning' : 'badge-danger');
            
            const tr = document.createElement('tr');
            tr.innerHTML = `
                <td>
                    <div style="display:flex; align-items:center; gap:10px;">
                        ${item.image ? `<img src="${item.image}" style="width:40px; height:40px; border-radius:8px; object-fit:cover;">` : '📦'}
                        <div>
                            <div style="font-weight:600;">${item.name}</div>
                            <div style="font-size:0.7rem; color:var(--text-muted);">${item.code}</div>
                        </div>
                    </div>
                </td>
                <td><b>${item.qty}</b> <span style="font-size:0.8rem; opacity:0.7;">${item.unit}</span></td>
                <td>📍 ${item.location}</td>
                <td><span class="badge ${conditionClass}">${item.condition}</span></td>
                <td>
                    <button class="btn-icon edit-btn" data-id="${item.id}">✏️</button>
                    <button class="btn-icon delete-btn" data-id="${item.id}">🗑️</button>
                </td>
            `;
            elements.body.appendChild(tr);
        });

        // Attach event listeners ke tombol yang baru dibuat
        document.querySelectorAll('.edit-btn').forEach(btn => {
            btn.onclick = () => editItem(btn.dataset.id);
        });
        document.querySelectorAll('.delete-btn').forEach(btn => {
            btn.onclick = () => deleteItem(btn.dataset.id);
        });
    }

    function updateDashboard() {
        elements.statTotal.textContent = inventoryData.length;
        elements.statHewan.textContent = inventoryData.filter(i => i.category === 'Hewan').length;
        elements.statBenda.textContent = inventoryData.filter(i => i.category === 'Benda').length;
        elements.statAlert.textContent = inventoryData.filter(i => i.condition !== 'Baik').length;
    }

    // --- FORM ACTIONS ---
    elements.form.addEventListener('submit', async (e) => {
        e.preventDefault();
        if (!currentUser) return showToast("Menunggu koneksi...");

        elements.submitBtn.disabled = true;
        elements.submitBtn.textContent = "⏳ Memproses...";

        const id = isEditing ? document.getElementById('editId').value : Date.now().toString();
        const docRef = doc(db, 'items', id);

        const payload = {
            code: elements.itemCode.value,
            name: elements.form.itemName.value,
            category: elements.form.category.value,
            condition: elements.form.condition.value,
            qty: parseInt(elements.form.qty.value) || 0,
            unit: elements.form.unit.value,
            location: elements.form.location.value,
            description: elements.form.description.value,
            image: currentImageBase64,
            updatedAt: serverTimestamp(),
            userId: currentUser.uid
        };

        try {
            await setDoc(docRef, payload);
            showToast(isEditing ? "Berhasil diperbarui!" : "Berhasil disimpan!");
            resetForm();
        } catch (err) {
            console.error("Save Error:", err);
            showToast("Gagal menyimpan data.");
        } finally {
            elements.submitBtn.disabled = false;
        }
    });

    // --- GLOBAL ACTIONS (Edit & Delete) ---
    window.deleteItem = async (id) => {
        if (!confirm("Hapus data ini?")) return;
        try {
            await deleteDoc(doc(db, 'items', id));
            showToast("Data dihapus!");
        } catch (err) {
            showToast("Gagal menghapus.");
        }
    };

    window.editItem = (id) => {
        const item = inventoryData.find(i => i.id === id);
        if (!item) return;

        isEditing = true;
        elements.formTitle.textContent = "Ubah Data";
        elements.cancelBtn.style.display = "block";
        elements.submitBtn.textContent = "🔄 Update Data";
        
        document.getElementById('editId').value = item.id;
        elements.itemCode.value = item.code;
        elements.form.itemName.value = item.name;
        elements.form.category.value = item.category;
        elements.form.condition.value = item.condition;
        elements.form.qty.value = item.qty;
        elements.form.unit.value = item.unit;
        elements.form.location.value = item.location;
        elements.form.description.value = item.description || "";
        
        if (item.image) {
            currentImageBase64 = item.image;
            elements.imgPrev.src = item.image;
            elements.imgPrev.style.display = "block";
        }
        window.scrollTo({ top: 0, behavior: 'smooth' });
    };

    // --- UTILS ---
    elements.imgInput.onchange = (e) => {
        const file = e.target.files[0];
        if (file) {
            const reader = new FileReader();
            reader.onload = (ev) => {
                currentImageBase64 = ev.target.result;
                elements.imgPrev.src = currentImageBase64;
                elements.imgPrev.style.display = 'block';
            };
            reader.readAsDataURL(file);
        }
    };

    function resetForm() {
        isEditing = false;
        elements.form.reset();
        elements.formTitle.textContent = "Tambah Inventori";
        elements.cancelBtn.style.display = "none";
        elements.submitBtn.textContent = "💾 Simpan ke Cloud";
        elements.imgPrev.style.display = "none";
        currentImageBase64 = "";
        generateCode();
    }

    elements.cancelBtn.onclick = resetForm;

    function generateCode() {
        elements.itemCode.value = "INV-" + Math.random().toString(36).substr(2, 6).toUpperCase();
    }

    function showToast(msg) {
        elements.toast.textContent = msg;
        elements.toast.style.display = 'block';
        setTimeout(() => elements.toast.style.display = 'none', 3000);
    }

    generateCode();
</script>
</body>
</html>
